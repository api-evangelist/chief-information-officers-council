aid: chief-information-officers-council
name: Chief Information Officers Council
x-type: government
description: >-
  The Chief Information Officers Council (CIOC) is the principal interagency
  forum for improving agency practices related to the design, acquisition,
  development, modernization, use, sharing, and performance of federal
  information resources. Established by Executive Order 13011 in 1996 and
  codified in the E-Government Act of 2002 (44 U.S.C. 3603), the Council is
  comprised of the Chief Information Officers and Deputy CIOs of executive
  branch agencies, the Federal CIO at OMB (who serves as Chair), the Federal
  Chief Information Security Officer, and the Administrator for Electronic
  Government. The CIOC develops recommendations for OMB IT policy, identifies
  opportunities to improve federal IT performance, coordinates multi-agency
  IT initiatives such as cybersecurity and cloud adoption, supports federal
  IT workforce development, and disseminates effective IT management
  practices across the federal government. The Council publishes guidance,
  playbooks, and resources through cio.gov and councils.gov.

apis:
  - aid: chief-information-officers-council:cioc-resources
    name: Chief Information Officers Council Resources
    description: >-
      The CIOC publishes its charter, leadership roster, committee output,
      playbooks (e.g., Cloud Smart, Modular Contracting, IT Modernization),
      and federal IT guidance through cio.gov and councils.gov. The Council
      does not expose a dedicated developer API; resources are distributed
      as web pages, PDFs, and downloadable documents alongside OMB and GSA
      federal IT management resources.
